name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: task-manager-api-backend
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: task-manager-api-backend/target/surefire-reports/
